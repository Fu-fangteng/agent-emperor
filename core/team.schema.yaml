# =============================================================================
# team.schema.yaml —— 多 Agent 编制配置的"格式定义 + 默认值"
# =============================================================================
#
# 这是整套框架的唯一事实源（source of truth）。
# 每个项目根目录有一份 team.yaml，定义这个项目用什么样的 agent 编制。
# 工具适配层（CC 的 skill、Codex 的 AGENTS.md、Cursor 的配置）都从 team.yaml
# **生成**（A 方案：生成式），不在工具里写死"谁当 reviewer"。
#
# 本文件有两个作用：
#   1. 文档化 team.yaml 的合法字段、取值、约束（见下方注释）。
#   2. 提供一份开箱即用的默认编制（DEFAULT，即下方实际 YAML 内容），
#      下方 planner/developer/reviewer 只是一份示例编制，你可以整套删掉
#      换成自己的角色，框架不绑定任何固定角色。
#      新项目可直接复制本文件为 team.yaml 后按需改。
#
# 改了 team.yaml 后，必须重新运行生成命令，让各工具适配文件同步更新。
# =============================================================================

# -----------------------------------------------------------------------------
# version: schema 版本，便于未来升级时做兼容判断。必填。
# -----------------------------------------------------------------------------
version: 1

# -----------------------------------------------------------------------------
# project: 项目级元信息。name 用于日志/归档命名，也作为身份锚点
#          「<产品/增量> · <role>」里的默认产品名来源；repos 声明这个项目的代码
#          散落在哪些仓库（跑测链路可能跨多个仓，审查方据此圈定 diff 范围）。
# -----------------------------------------------------------------------------
project:
  name: my-project            # 改成你的项目名
  repos:                      # 这个项目涉及的仓库；单仓就写一个
    - .                       # "." 表示当前仓库本身

# -----------------------------------------------------------------------------
# roles: 这个项目启用哪几个 role（角色 = 要干的活，与具体工具无关）。
#   下方 planner/developer/reviewer 只是一份示例编制，你可以整套删掉
#   换成自己的角色，框架不绑定任何固定角色。
#   推荐写成对象列表，每个 role 可声明：
#     name            角色名，自由字符串
#     desc            一句话职责描述
#     can_write_code  是否允许修改源代码；默认 false
#   兼容旧写法：纯字符串视为 {name: <字符串>, can_write_code: false}。
#   常见示例 role：
#     planner   —— 写需求和方案（requirements.md / plan.md）
#     developer —— 改代码、跑验证、写交接（handoff.md）
#     reviewer  —— 审 diff、按 P0-P3 写意见（review.md）
#     tester    —— 跑测试套件、出测试报告（可选，小项目常并入 developer）
#   你可以只用其中几个。role 名称必须与 handoff 段、agents 段引用的一致。
# -----------------------------------------------------------------------------
roles:
  - name: planner
    desc: 写需求和方案，明确范围、验收标准和实施计划
    can_write_code: false
  - name: developer
    desc: 修改源代码、运行验证、维护交接说明
    can_write_code: true
  - name: reviewer
    desc: 独立审查 diff 和测试结果，输出 P0-P3 findings
    can_write_code: false

# -----------------------------------------------------------------------------
# agents: 你实际开几个 AI 客户端，以及每个客户端担任哪些 role。
#   - name : agent 的标识符（自取，用于交接 prompt 里点名"轮到谁"）。
#   - tool : 用的工具。已支持 claude-code | codex。
#   - roles: 这个 agent 承担的 role 列表（可多个，如 CC 同时 plan+review）。
#   约束：
#     * roles 段里出现的每个 role，都必须在顶层 roles 列表里声明。
#     * 顶层 roles 里的每个 role，至少要被一个 agent 认领（否则没人干这活）。
#     * 同一个 role 可以被多个 agent 认领，但同一时刻只有一个在动（靠 STATUS 串行）。
# -----------------------------------------------------------------------------
agents:
  - name: cc
    tool: claude-code
    roles: [planner, reviewer]
  - name: codex
    tool: codex
    roles: [developer]

# -----------------------------------------------------------------------------
# handoff: 交接逻辑 = STATUS 状态机的"边" = 你说的"节点"。
#   每条规则表示：当共享文件里的 STATUS 翻到某个 state 时，下一棒交给哪个 role。
#   - state      : STATUS 值（大写下划线命名）。
#   - next_role  : 该状态下轮到哪个 role 接手；null 表示流程到此收尾（归档）。
#   - human_gate : 是否需要人工在此节点审查/裁决后才推进（true/false）。
#                 这是"人工编排"的体现：每个 human_gate=true 的节点，
#                 同时是一个审查点 + commit 点 + 交接点。
#   - on_done    : 常规完成后要写入 handoff.md 的下一个 STATUS。
#   - transitions: 有分支时用列表声明可选去向，避免 worker 猜下一状态。
#                  每项格式：{ result: "无异议", state: PLAN_DONE }。
#   下方是示例编制（plan → dev → review → 归档）的状态流转。
#   如果角色不同，状态机也应随之调整，以本段为准。
# -----------------------------------------------------------------------------
handoff:
  - { state: PLANNING,           next_role: planner,    human_gate: false, on_done: PLAN_DONE }
  - { state: PLAN_DONE,          next_role: developer,  human_gate: true,  on_done: DEV_DONE }
  - state: DEV_DONE
    next_role: reviewer
    human_gate: true
    transitions:
      - { result: "审查通过", state: APPROVED }
      - { result: "需要修改", state: CHANGES_REQUESTED }
  - { state: CHANGES_REQUESTED,  next_role: developer,  human_gate: true,  on_done: DEV_DONE }
  - { state: APPROVED,           next_role: null,       human_gate: true }

# -----------------------------------------------------------------------------
# bus: 文件总线的位置与归属规则（防冲突的核心）。
#   - dir         : 共享文件总线根目录（相对仓库根）。
#   - ownership   : 每份文件谁能写、怎么写。避免两个 agent 同时改一份文件。
#                   write="exclusive" 表示独占主笔；"append" 表示只能追加不改正文。
#                   owner 用 role 名（不是 agent 名），因为归属跟着角色走。
#   ⚠ 下方是示例编制（plan-dev-review）的 ownership 配置。如果你换了角色,
#     必须同步改 owner 字段(比如 analyst/pentester/auditor 项目),保持
#     ownership 引用的角色名都在上面 roles 列表里声明过——否则生成器只会
#     按字面写进适配文件,运行时容易出"幻影角色"。
#   详见 core/bus-templates/。
# -----------------------------------------------------------------------------
bus:
  dir: docs/agent-collaboration
  ownership:
    - { file: requirements.md, owner: planner,   write: exclusive }
    - { file: plan.md,         owner: planner,   write: exclusive, note: "developer 只在「开发方反馈」段追加" }
    - { file: handoff.md,      owner: developer, write: exclusive, note: "顶部带 STATUS 块" }
    - { file: review.md,       owner: reviewer,  write: exclusive }
    - { file: decisions.md,    owner: shared,    write: append,    note: "每条带 [名字 日期] 前缀" }
    - { file: rounds/INDEX.md, owner: shared,    write: append }

# -----------------------------------------------------------------------------
# config_files: 不允许任一 agent 擅自修改、必须走交接说明的配置文件。
#   把项目里那些"改错会让全员排查半天"的关键配置列进来，agent 想动会先走交接。
#   下面是示例（请按你的项目替换为真实文件名），无此类文件可整段删掉。
# -----------------------------------------------------------------------------
config_files: []
  # 示例（请替换为本项目的关键配置文件）：
  # - api-keys.yaml
  # - production.env

# -----------------------------------------------------------------------------
# anchor: 身份锚点。要求每个 agent 在每轮回复结尾固定加一句"身份签名"。
#   - 锚点的【内核】永远是「<产品/增量> · <role>」，这才是身份本身。
#   - 锚点的【外壳】由 style 决定，只是让它好认、好玩。
#   作用有二：① 让模型时刻清楚自己是谁；② 当某轮回复没带锚点时，
#   你一眼就知道它丢了上下文——可回它一句"你是谁？"把它拽回身份。
#
#   style 可选 10 种预设（generate.py 内置模板，改风格重跑生成器即可）：
#     radio     电台呼号 over～        🦫 仅 stamp/cat 用吉祥物
#     stamp     打卡盖章 + role 吉祥物   ← 默认
#     butler    管家侍从（蹭"主人"梗）
#     save      游戏存档点
#     chunni    中二宣言
#     express   快递签收
#     captain   航空机长广播
#     cat       猫咪附体（卖萌）
#     wuxia     武侠抱拳
#     terminal  终端提示符（极客风）
#
#   role_emoji: 仅 style=stamp / cat 时生效，给每个 role 配一只吉祥物。
#     未列出的 role 回退到 🐾。可自取，图个乐。
# -----------------------------------------------------------------------------
anchor:
  style: stamp
  role_emoji:
    planner: 🦝
    developer: 🦫
    reviewer: 🦉
